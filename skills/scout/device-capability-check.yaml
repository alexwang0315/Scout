id: device-capability-check
version: 0.1.0
status: experimental
type: check
priority: 20
triggers:
  - event: mission.preflight
    description: Verify local devices declare the capabilities needed for Phase 2 brain updates.
    required_refs:
      - brain.devices
activation_gate:
  mode: manual
  requires_human_approval: false
  conditions:
    - mission file brain is available
noise_control:
  cooldown_seconds: 900
  dedupe_window_seconds: 1800
  max_runs_per_mission: 4
  suppression_keys:
    - mission_id
    - device_id
preflight:
  required_skill_ids: []
  required_capabilities:
    - file_brain.read
  required_artifacts: []
allowed_reads:
  - brain.devices
  - brain.people
allowed_writes:
  - brain.facts
  - brain.reviews
forbidden_writes:
  - phase1.runtime
  - pdr.samples
  - route_progress.state
output_schema:
  format: brain-node
  node_types:
    - ObservedFact
    - HumanReview
  required_fields:
    - subject
    - predicate
    - evidence
failure_policy:
  on_error: record_failure
  retry:
    max_attempts: 0
    backoff_seconds: 0
  degrade_to: null
control_surface:
  operator_visible: true
  manual_run_allowed: true
  disable_allowed: true
  status_label: Device capability check
audit:
  log_inputs: true
  log_outputs: true
  log_decision: true
  retention: mission_lifetime
