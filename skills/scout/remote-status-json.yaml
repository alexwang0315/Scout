id: remote-status-json
version: 0.1.0
status: experimental
type: artifact
priority: 50
triggers:
  - event: remote_contact.status_request
    description: Build a compact remote status JSON artifact from validated file-brain state.
    required_refs:
      - brain.remote-status-artifacts
activation_gate:
  mode: operator_approved
  requires_human_approval: true
  conditions:
    - operator approves external sharing
    - communication state has been checked
noise_control:
  cooldown_seconds: 300
  dedupe_window_seconds: 600
  max_runs_per_mission: 20
  suppression_keys:
    - mission_id
    - remote_contact_id
preflight:
  required_skill_ids:
    - device-capability-check
    - communication-state-check
    - latest-team-position-check
  required_capabilities:
    - file_brain.read
    - file_brain.write_artifact
  required_artifacts: []
allowed_reads:
  - brain.missions
  - brain.teams
  - brain.people
  - brain.facts
  - brain.measurements
  - brain.remote-status-artifacts
allowed_writes:
  - brain.remote-status-artifacts
  - brain.artifacts
forbidden_writes:
  - phase1.runtime
  - pdr.samples
  - route_progress.state
output_schema:
  format: status-json
  node_types:
    - RemoteStatusArtifact
  artifact_kinds:
    - remote_status_json
  required_fields:
    - generated_at
    - freshness_seconds
    - status
    - message
failure_policy:
  on_error: record_failure
  retry:
    max_attempts: 0
    backoff_seconds: 0
  degrade_to: team-checkin-summary
control_surface:
  operator_visible: true
  manual_run_allowed: true
  disable_allowed: true
  status_label: Remote status JSON
audit:
  log_inputs: true
  log_outputs: true
  log_decision: true
  retention: incident_package
