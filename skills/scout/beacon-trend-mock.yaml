id: beacon-trend-mock
version: 0.1.0
status: experimental
type: beacon
priority: 40
triggers:
  - event: mission.mock_beacon_trend_received
    description: Record mock beacon trend evidence without controlling radio or device hardware.
    required_refs:
      - brain.beacon-nodes
      - artifact.mock-rssi-scan
activation_gate:
  mode: operator_approved
  requires_human_approval: true
  conditions:
    - operator confirms mock beacon evidence is for replay or drill use
    - exact position claims remain disabled
noise_control:
  cooldown_seconds: 300
  dedupe_window_seconds: 600
  max_runs_per_mission: 12
  suppression_keys:
    - mission_id
    - beacon_id
preflight:
  required_skill_ids:
    - team-rendezvous-beacon
  required_capabilities:
    - file_brain.read
    - file_brain.write
  required_artifacts: []
allowed_reads:
  - brain.devices
  - brain.teams
  - brain.beacon-nodes
  - brain.artifacts
allowed_writes:
  - brain.signal-bearing-measurements
  - brain.reviews
forbidden_writes:
  - phase1.runtime
  - pdr.samples
  - route_progress.state
  - radio.hardware
  - device.hardware
output_schema:
  format: brain-node
  node_types:
    - SignalBearingMeasurement
    - HumanReview
  required_fields:
    - beacon_id
    - trend
    - exact_position_claimed
failure_policy:
  on_error: record_failure
  retry:
    max_attempts: 0
    backoff_seconds: 0
  degrade_to: team-rendezvous-beacon
control_surface:
  operator_visible: true
  manual_run_allowed: true
  disable_allowed: true
  status_label: Mock beacon trend
audit:
  log_inputs: true
  log_outputs: true
  log_decision: true
  retention: incident_package
