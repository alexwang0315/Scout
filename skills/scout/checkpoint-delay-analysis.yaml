id: checkpoint-delay-analysis
version: 0.1.0
status: experimental
type: analysis
priority: 55
triggers:
  - event: mission.delay_detected
    description: Compare planned and observed checkpoint timing from file-brain records.
    required_refs:
      - brain.checkpoints
      - brain.measurements
activation_gate:
  mode: operator_approved
  requires_human_approval: true
  conditions:
    - planned checkpoint timing exists
    - observed arrival or freshness evidence exists
noise_control:
  cooldown_seconds: 900
  dedupe_window_seconds: 1800
  max_runs_per_mission: 10
  suppression_keys:
    - mission_id
    - checkpoint_id
preflight:
  required_skill_ids:
    - latest-team-position-check
  required_capabilities:
    - file_brain.read
  required_artifacts: []
allowed_reads:
  - brain.routes
  - brain.segments
  - brain.checkpoints
  - brain.facts
  - brain.measurements
allowed_writes:
  - brain.measurements
  - brain.interpretations
  - brain.decision-option-sets
forbidden_writes:
  - phase1.runtime
  - pdr.samples
  - route_progress.state
output_schema:
  format: brain-node
  node_types:
    - DerivedMeasurement
    - ModelInterpretation
    - DecisionOptionSet
  required_fields:
    - subject
    - derived_from
    - confidence
failure_policy:
  on_error: record_failure
  retry:
    max_attempts: 0
    backoff_seconds: 0
  degrade_to: latest-team-position-check
control_surface:
  operator_visible: true
  manual_run_allowed: true
  disable_allowed: true
  status_label: Checkpoint delay analysis
audit:
  log_inputs: true
  log_outputs: true
  log_decision: true
  retention: incident_package
