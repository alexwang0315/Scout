<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Scout Phase 1 Admin</title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      --bg: #111315;
      --surface: #181b1f;
      --panel: #20242a;
      --border: #343a42;
      --text: #eef1f4;
      --muted: #a8b0ba;
      --route: #21a6a1;
      --corridor: #56616d;
      --checkpoint: #f2b84b;
      --hazard: #d65d5d;
      --event: #e07a3f;
      --ok: #76b56d;
      --focus: #8ab4f8;
      --cat-replay: #76b56d;
      --cat-checkpoint: #f2b84b;
      --cat-segment: #3f8cff;
      --cat-capsule: #21a6a1;
      --cat-timeline: #b68cff;
      --cat-risk: #d65d5d;
      --cat-map: #8b96a3;
      --cat-route: #21a6a1;
      --cat-start: #76b56d;
      --cat-finish: #f0d264;
      --cat-signal: #8ab4f8;
      --cat-retreat: #e07a3f;
      --info-width: 430px;
      --tree-height: 58%;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .shell {
      display: grid;
      grid-template-columns: minmax(420px, 1fr) 6px minmax(320px, var(--info-width));
      height: 100vh;
      overflow: hidden;
    }

    .map-pane, .info-pane {
      min-width: 0;
      border-color: var(--border);
    }

    .map-pane {
      display: grid;
      grid-template-rows: auto 1fr;
      background: #131619;
      min-height: 0;
    }

    .info-pane {
      display: grid;
      grid-template-rows: minmax(220px, var(--tree-height)) 6px minmax(180px, 1fr);
      background: var(--surface);
      min-height: 0;
    }

    h1, h2, h3, p { margin: 0; }
    h1 { font-size: 18px; font-weight: 650; letter-spacing: 0; }
    h2 { margin: 22px 0 10px; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0; }
    h3 { font-size: 15px; font-weight: 650; }

    .meta {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(96px, 1fr));
      gap: 8px;
    }

    .metric {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      background: var(--panel);
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 11px;
    }

    .metric strong {
      display: block;
      margin-top: 4px;
      font-size: 16px;
      letter-spacing: 0;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    label {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
      font-size: 12px;
    }

    input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--focus);
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .toolbar-main {
      display: grid;
      gap: 10px;
      min-width: 0;
      width: 100%;
    }

    .toolbar-title {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
    }

    .toolbar code {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .map-wrap {
      position: relative;
      min-height: 0;
      overflow: hidden;
    }

    .splitter {
      background: var(--border);
      position: relative;
      z-index: 10;
    }

    .splitter::after {
      content: "";
      position: absolute;
      inset: 0;
      background: transparent;
      transition: background 120ms ease;
    }

    .splitter:hover::after,
    .splitter.is-dragging::after {
      background: var(--focus);
    }

    .splitter-vertical {
      cursor: col-resize;
    }

    .splitter-horizontal {
      cursor: row-resize;
    }

    .tree-pane,
    .json-pane {
      min-height: 0;
      overflow: auto;
      padding: 16px;
    }

    .tree-pane {
      border-bottom: 1px solid var(--border);
    }

    .json-pane {
      border-top: 1px solid var(--border);
    }

    .hover-hint {
      position: fixed;
      z-index: 20;
      max-width: 320px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: rgba(24, 27, 31, 0.96);
      color: var(--text);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.32);
      pointer-events: none;
      transform: translate(14px, 14px);
    }

    .hover-hint strong {
      display: block;
      margin-bottom: 4px;
      font-size: 13px;
    }

    .hover-hint span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    .hover-hint.is-hidden {
      display: none;
    }

    svg {
      width: 100%;
      height: 100%;
      display: block;
      background: #121619;
    }

    .corridor {
      fill: none;
      stroke: var(--corridor);
      stroke-width: 1;
      opacity: 0.42;
      vector-effect: non-scaling-stroke;
    }

    .route {
      fill: none;
      stroke: var(--route);
      stroke-width: 2.5;
      opacity: 0.95;
      vector-effect: non-scaling-stroke;
    }

    .checkpoint {
      fill: var(--checkpoint);
      stroke: #171a1e;
      stroke-width: 1.5;
      cursor: pointer;
      vector-effect: non-scaling-stroke;
    }

    .checkpoint-start {
      fill: var(--cat-start);
    }

    .checkpoint-finish {
      fill: var(--cat-finish);
    }

    .checkpoint-signal_spot {
      fill: var(--cat-signal);
    }

    .checkpoint-retreat_point {
      fill: var(--cat-retreat);
    }

    .checkpoint-trailhead {
      fill: var(--cat-segment);
    }

    .hazard {
      fill: rgba(214, 93, 93, 0.24);
      stroke: var(--hazard);
      stroke-width: 1.5;
      vector-effect: non-scaling-stroke;
    }

    .event {
      fill: var(--event);
      stroke: #171a1e;
      stroke-width: 1.5;
      cursor: pointer;
      vector-effect: non-scaling-stroke;
    }

    .is-hidden { display: none; }
    .focus-ring { outline: 2px solid var(--focus); outline-offset: 2px; }

    .tree {
      display: grid;
      gap: 8px;
      margin-top: 14px;
    }

    .tree details {
      border: 1px solid var(--border);
      border-left: 4px solid var(--category-color, var(--border));
      border-radius: 6px;
      background: var(--panel);
      overflow: hidden;
    }

    .tree summary {
      cursor: pointer;
      padding: 10px 12px;
      font-weight: 650;
      background: color-mix(in srgb, var(--category-color, var(--panel)) 14%, transparent);
    }

    .tree-group {
      display: grid;
      gap: 6px;
      padding: 0 10px 10px;
    }

    .tree button {
      width: 100%;
      text-align: left;
      color: var(--text);
      background: #171b20;
      border: 1px solid var(--border);
      border-left: 4px solid var(--category-color, var(--border));
      border-radius: 6px;
      padding: 8px 10px;
      cursor: pointer;
    }

    .tree button:hover {
      background: color-mix(in srgb, var(--category-color, #171b20) 18%, #171b20);
    }

    .tree button:focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: 2px;
    }

    .tree small {
      display: block;
      color: var(--muted);
      margin-top: 4px;
    }

    .source {
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    pre {
      margin: 12px 0 0;
      padding: 12px;
      max-height: none;
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #111417;
      color: #dfe5ec;
      font-size: 12px;
      white-space: pre-wrap;
    }

    .status {
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--panel);
      color: var(--muted);
    }

    @media (max-width: 980px) {
      .shell {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
        height: auto;
        overflow: visible;
      }
      .splitter { display: none; }
      .map-pane { min-height: 70vh; }
      .info-pane { grid-template-rows: auto auto; }
      .metric-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div id="shell" class="shell">
    <main class="map-pane">
      <div class="toolbar">
        <div class="toolbar-main">
          <div class="toolbar-title">
            <h1>Scout Phase 1 Admin</h1>
            <code id="mapMeta">offline map evidence</code>
          </div>
          <p id="caseMeta" class="meta">Loading case...</p>
          <div class="metric-grid">
            <div class="metric"><span>Safety Level</span><strong id="safetyLevel">-</strong></div>
            <div class="metric"><span>Capsules</span><strong id="segmentCapsules">-</strong></div>
            <div class="metric"><span>Route Points</span><strong id="routePoints">-</strong></div>
            <div class="metric"><span>Corridors</span><strong id="corridors">-</strong></div>
            <div class="metric"><span>Checkpoints</span><strong id="checkpoints">-</strong></div>
            <div class="metric"><span>Incidents</span><strong id="incidents">-</strong></div>
          </div>
          <div class="filters" aria-label="Map layers">
            <label><input type="checkbox" data-layer="corridors" checked> Map corridors</label>
            <label><input type="checkbox" data-layer="route" checked> Route</label>
            <label><input type="checkbox" data-layer="checkpoints" checked> Checkpoints</label>
            <label><input type="checkbox" data-layer="hazards" checked> Hazards</label>
            <label><input type="checkbox" data-layer="events" checked> Ln events</label>
          </div>
        </div>
      </div>
      <div class="map-wrap">
        <svg id="map" role="img" aria-label="Scout after-action evidence map"></svg>
      </div>
    </main>

    <div id="verticalResizer" class="splitter splitter-vertical" role="separator" aria-orientation="vertical" tabindex="0"></div>

    <section id="infoPane" class="info-pane">
      <div class="tree-pane">
        <h2>Evidence Tree</h2>
        <div id="evidenceTree" class="tree"></div>
      </div>
      <div id="horizontalResizer" class="splitter splitter-horizontal" role="separator" aria-orientation="horizontal" tabindex="0"></div>
      <div id="jsonPane" class="json-pane">
        <h2>Selected JSON</h2>
        <h3 id="detailTitle">No selection</h3>
        <p id="detailSource" class="source">Hover or select map evidence.</p>
        <pre id="detailJson">{}</pre>
      </div>
    </section>
  </div>
  <div id="hoverHint" class="hover-hint is-hidden" role="status" aria-live="polite"></div>

  <script>
    const CASE_ID = "scout_260512_field_golden";
    const state = { view: null, projected: null, selected: null };
    const svg = document.getElementById("map");
    const hoverHint = document.getElementById("hoverHint");
    const layerInputs = document.querySelectorAll("[data-layer]");

    function apiBase() {
      if (location.protocol === "file:") return "http://127.0.0.1:9099";
      return "";
    }

    function el(name, attrs = {}, text = "") {
      const node = document.createElementNS("http://www.w3.org/2000/svg", name);
      Object.entries(attrs).forEach(([key, value]) => node.setAttribute(key, value));
      if (text) node.textContent = text;
      return node;
    }

    function project(bounds, lat, lon) {
      const width = 1000;
      const height = 720;
      const pad = 34;
      const lonSpan = Math.max(bounds.east - bounds.west, 0.000001);
      const latSpan = Math.max(bounds.north - bounds.south, 0.000001);
      const x = pad + ((lon - bounds.west) / lonSpan) * (width - pad * 2);
      const y = height - pad - ((lat - bounds.south) / latSpan) * (height - pad * 2);
      return [x, y];
    }

    function pathFromCoords(bounds, coords) {
      return coords.map((point, index) => {
        const [x, y] = project(bounds, point.lat, point.lon);
        return `${index === 0 ? "M" : "L"}${x.toFixed(2)},${y.toFixed(2)}`;
      }).join(" ");
    }

    function boundsWithMap(view) {
      const b = { ...view.route.bounds };
      view.map.corridors.forEach(corridor => {
        corridor.coordinates.forEach(point => {
          b.south = Math.min(b.south, point.lat);
          b.north = Math.max(b.north, point.lat);
          b.west = Math.min(b.west, point.lon);
          b.east = Math.max(b.east, point.lon);
        });
      });
      return b;
    }

    function setDetail(item) {
      state.selected = item;
      document.getElementById("detailTitle").textContent = item.name || item.checkpoint_id || item.corridor_id || item.incident_id || item.source_id || item.evidence_type;
      document.getElementById("detailSource").textContent = `${item.evidence_type || "evidence"} | ${item.source_path || "no source path"}`;
      document.getElementById("detailJson").textContent = JSON.stringify(item, null, 2);
    }

    function evidenceCategory(item) {
      if (!item) return "map";
      if (item.evidence_type === "replay_summary") return "replay";
      if (item.evidence_type === "mission_checkpoint" || item.checkpoint_id) return "checkpoint";
      if (item.evidence_type === "mission_segment") return "segment";
      if (item.evidence_type === "segment_capsule") return "capsule";
      if (item.evidence_type === "runtime_decision" || item.evidence_type === "replay_checkpoint") return "timeline";
      if (item.evidence_type === "risk_rule") return "risk";
      if (item.evidence_type === "device_observation") return "route";
      return "map";
    }

    function categoryColor(category) {
      const colors = {
        replay: "var(--cat-replay)",
        checkpoint: "var(--cat-checkpoint)",
        segment: "var(--cat-segment)",
        capsule: "var(--cat-capsule)",
        timeline: "var(--cat-timeline)",
        risk: "var(--cat-risk)",
        map: "var(--cat-map)",
        route: "var(--cat-route)"
      };
      return colors[category] || colors.map;
    }

    function checkpointClass(checkpoint) {
      return `checkpoint checkpoint-${checkpoint.checkpoint_type || "waypoint"}`;
    }

    function hintTitle(item) {
      return item.name || item.checkpoint_id || item.corridor_id || item.rule_id || item.incident_id || item.source_id || item.evidence_type;
    }

    function hintSummary(item) {
      if (item.evidence_type === "map_corridor") {
        return `${item.route_level || "corridor"} | width ${item.corridor_half_width_m}m | confidence ${item.source_metadata?.confidence ?? "-"}`;
      }
      if (item.evidence_type === "mission_checkpoint") {
        return `${item.checkpoint_type} | radius ${item.arrival_radius_m}m | ${item.control_zone_after || "no zone"}`;
      }
      if (item.evidence_type === "risk_rule") {
        return `${item.output_level} | ${item.hazard_types.join(", ") || "any hazard"} | ${item.min_duration_s}s`;
      }
      if (item.evidence_type === "incident_package") {
        return `${item.trigger_level} | ${item.trigger_event?.event_type || "event"} | samples ${item.raw_sample_count}`;
      }
      if (item.evidence_type === "replay_summary") {
        return `${item.safety_level} | obs ${item.observations_processed} | checkpoints ${item.checkpoint_count}`;
      }
      if (item.evidence_type === "replay_checkpoint") {
        return `${item.label} | distance ${Number(item.distance_m || 0).toFixed(1)}m`;
      }
      if (item.evidence_type === "segment_capsule") {
        const capsule = item.capsule || item;
        return `${capsule.segment_id || item.capsule_id} | ${capsule.start_checkpoint_id || "-"} -> ${capsule.end_checkpoint_id || "-"}`;
      }
      if (item.evidence_type === "device_observation") {
        return `progress ${Math.round(item.total_progress_m || item.progress_m || 0)}m | points ${item.point_count || item.index || "-"}`;
      }
      return item.source_path || "evidence";
    }

    function showHint(event, item) {
      hoverHint.innerHTML = `<strong>${hintTitle(item)}</strong><span>${hintSummary(item)}</span>`;
      moveHint(event);
      hoverHint.classList.remove("is-hidden");
    }

    function moveHint(event) {
      const rect = event.target && event.target.getBoundingClientRect ? event.target.getBoundingClientRect() : null;
      const clientX = Number.isFinite(event.clientX) ? event.clientX : (rect ? rect.left : window.innerWidth / 2);
      const clientY = Number.isFinite(event.clientY) ? event.clientY : (rect ? rect.top : window.innerHeight / 2);
      const x = Math.min(clientX, window.innerWidth - 340);
      const y = Math.min(clientY, window.innerHeight - 120);
      hoverHint.style.left = `${x}px`;
      hoverHint.style.top = `${y}px`;
    }

    function hideHint() {
      hoverHint.classList.add("is-hidden");
    }

    function attachEvidence(node, item) {
      node.tabIndex = 0;
      node.addEventListener("mouseenter", event => {
        setDetail(item);
        showHint(event, item);
      });
      node.addEventListener("mousemove", moveHint);
      node.addEventListener("mouseleave", hideHint);
      node.addEventListener("focus", event => {
        setDetail(item);
        showHint(event, item);
      });
      node.addEventListener("blur", hideHint);
      node.addEventListener("click", event => {
        setDetail(item);
        showHint(event, item);
      });
      node.addEventListener("keydown", event => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          setDetail(item);
        }
      });
    }

    function renderMap(view) {
      const bounds = boundsWithMap(view);
      svg.setAttribute("viewBox", "0 0 1000 720");
      svg.replaceChildren();

      const corridorGroup = el("g", {"data-layer-group": "corridors"});
      view.map.corridors.forEach(corridor => {
        if (corridor.coordinates.length < 2) return;
        const path = el("path", {d: pathFromCoords(bounds, corridor.coordinates), class: "corridor"});
        attachEvidence(path, corridor);
        corridorGroup.appendChild(path);
      });
      svg.appendChild(corridorGroup);

      const hazardGroup = el("g", {"data-layer-group": "hazards"});
      view.map.hazards.forEach(hazard => {
        const path = el("path", {d: pathFromCoords(bounds, hazard.polygon) + " Z", class: "hazard"});
        attachEvidence(path, hazard);
        hazardGroup.appendChild(path);
      });
      svg.appendChild(hazardGroup);

      const routeCoords = view.route.points.map(point => ({lat: point.lat, lon: point.lon}));
      const routeGroup = el("g", {"data-layer-group": "route"});
      const routePath = el("path", {d: pathFromCoords(bounds, routeCoords), class: "route"});
      attachEvidence(routePath, {
        evidence_type: "device_observation",
        source_id: "route",
        source_path: view.route.source_path,
        point_count: view.route.point_count,
        total_progress_m: view.route.total_progress_m,
        bounds: view.route.bounds
      });
      routeGroup.appendChild(routePath);
      svg.appendChild(routeGroup);

      const checkpointGroup = el("g", {"data-layer-group": "checkpoints"});
      view.mission.checkpoints.forEach(checkpoint => {
        const [x, y] = project(bounds, checkpoint.lat, checkpoint.lon);
        const circle = el("circle", {cx: x, cy: y, r: 5, class: checkpointClass(checkpoint)});
        attachEvidence(circle, checkpoint);
        checkpointGroup.appendChild(circle);
      });
      svg.appendChild(checkpointGroup);

      const eventGroup = el("g", {"data-layer-group": "events"});
      view.incident_packages.forEach(packageItem => {
        const sample = packageItem.trigger_event && packageItem.trigger_event.details;
        const lat = sample && (sample.lat || sample.observation_lat);
        const lon = sample && (sample.lon || sample.observation_lon);
        if (typeof lat !== "number" || typeof lon !== "number") return;
        const [x, y] = project(bounds, lat, lon);
        const marker = el("circle", {cx: x, cy: y, r: 6, class: "event"});
        attachEvidence(marker, packageItem);
        eventGroup.appendChild(marker);
      });
      svg.appendChild(eventGroup);

      updateLayers();
    }

    function treeButton(item, label, sublabel = "") {
      const button = document.createElement("button");
      button.type = "button";
      button.style.setProperty("--category-color", categoryColor(evidenceCategory(item)));
      button.textContent = label;
      if (sublabel) {
        const small = document.createElement("small");
        small.textContent = sublabel;
        button.appendChild(small);
      }
      button.addEventListener("click", () => setDetail(item));
      return button;
    }

    function treeGroup(title, items, mapper, open = false, category = "map") {
      const details = document.createElement("details");
      details.open = open;
      details.style.setProperty("--category-color", categoryColor(category));
      const summary = document.createElement("summary");
      summary.textContent = `${title} (${items.length})`;
      const group = document.createElement("div");
      group.className = "tree-group";
      items.forEach(item => {
        const mapped = mapper(item);
        group.appendChild(treeButton(item, mapped.label, mapped.sublabel));
      });
      details.appendChild(summary);
      details.appendChild(group);
      return details;
    }

    function renderEvidenceTree(view) {
      const tree = document.getElementById("evidenceTree");
      tree.replaceChildren();
      tree.appendChild(treeGroup("Replay", [view.replay], item => ({
        label: item.safety_level,
        sublabel: `${item.observations_processed.toLocaleString()} observations | ${item.checkpoint_count} checkpoints | ${item.segment_capsule_count} capsules`
      }), true, "replay"));
      tree.appendChild(treeGroup("Checkpoints", view.mission.checkpoints, item => ({
        label: item.checkpoint_id,
        sublabel: `${item.checkpoint_type} | ${item.control_zone_after || "no zone"}`
      }), true, "checkpoint"));
      tree.appendChild(treeGroup("Segments", view.mission.segments, item => ({
        label: item.segment_id,
        sublabel: `${item.from_checkpoint_id} -> ${item.to_checkpoint_id} | ${Math.round(item.distance_m)}m`
      }), true, "segment"));
      tree.appendChild(treeGroup("Segment Capsules", view.segment_capsules, item => ({
        label: item.capsule_id,
        sublabel: `${item.segment_id || "-"} | ${item.start_checkpoint_id || "-"} -> ${item.end_checkpoint_id || "-"}`
      }), false, "capsule"));
      tree.appendChild(treeGroup("Timeline", view.safety_timeline, item => ({
        label: item.label || item.to_level || item.evidence_type,
        sublabel: `${item.timestamp === null || item.timestamp === undefined ? "" : `t=${Number(item.timestamp).toFixed(0)} | `}${item.reason || item.evidence_type}`
      }), false, "timeline"));
      tree.appendChild(treeGroup("Risk Rules", view.risk_rules, item => ({
        label: item.rule_id,
        sublabel: `${item.output_level} | ${item.hazard_types.join(", ") || "any"}`
      }), false, "risk"));
      tree.appendChild(treeGroup("Map Layers", [
        {
          evidence_type: "map_layer_summary",
          source_id: "map_corridors",
          source_path: view.map.source_path,
          name: "Map corridors",
          count: view.map.corridors.length,
          metadata: view.map.metadata
        },
        {
          evidence_type: "map_layer_summary",
          source_id: "map_hazards",
          source_path: view.map.source_path,
          name: "Hazards",
          count: view.map.hazards.length,
          metadata: view.map.metadata
        },
        {
          evidence_type: "map_layer_summary",
          source_id: "map_pois",
          source_path: view.map.source_path,
          name: "POIs",
          count: view.map.pois.length,
          metadata: view.map.metadata
        }
      ], item => ({
        label: item.name,
        sublabel: `${item.count} items | ${item.metadata.source}`
      }), false, "map"));
    }

    function initSplitters() {
      const shell = document.getElementById("shell");
      const infoPane = document.getElementById("infoPane");
      const vertical = document.getElementById("verticalResizer");
      const horizontal = document.getElementById("horizontalResizer");
      const minInfo = 320;
      const maxInfo = 760;
      const minTree = 180;
      const minJson = 180;

      vertical.addEventListener("pointerdown", event => {
        event.preventDefault();
        vertical.setPointerCapture(event.pointerId);
        vertical.classList.add("is-dragging");
        const onMove = moveEvent => {
          const shellRect = shell.getBoundingClientRect();
          const width = Math.max(minInfo, Math.min(maxInfo, shellRect.right - moveEvent.clientX - 6));
          shell.style.setProperty("--info-width", `${width}px`);
        };
        const onUp = upEvent => {
          vertical.releasePointerCapture(upEvent.pointerId);
          vertical.classList.remove("is-dragging");
          vertical.removeEventListener("pointermove", onMove);
          vertical.removeEventListener("pointerup", onUp);
        };
        vertical.addEventListener("pointermove", onMove);
        vertical.addEventListener("pointerup", onUp);
      });

      horizontal.addEventListener("pointerdown", event => {
        event.preventDefault();
        horizontal.setPointerCapture(event.pointerId);
        horizontal.classList.add("is-dragging");
        const onMove = moveEvent => {
          const rect = infoPane.getBoundingClientRect();
          const height = Math.max(minTree, Math.min(rect.height - minJson - 6, moveEvent.clientY - rect.top));
          infoPane.style.setProperty("--tree-height", `${height}px`);
        };
        const onUp = upEvent => {
          horizontal.releasePointerCapture(upEvent.pointerId);
          horizontal.classList.remove("is-dragging");
          horizontal.removeEventListener("pointermove", onMove);
          horizontal.removeEventListener("pointerup", onUp);
        };
        horizontal.addEventListener("pointermove", onMove);
        horizontal.addEventListener("pointerup", onUp);
      });
    }

    function updateMetrics(view) {
      document.getElementById("caseMeta").textContent = view.summary.description || view.case_id;
      document.getElementById("safetyLevel").textContent = view.replay.safety_level;
      document.getElementById("segmentCapsules").textContent = view.replay.segment_capsule_count.toLocaleString();
      document.getElementById("routePoints").textContent = view.replay.observations_processed.toLocaleString();
      document.getElementById("corridors").textContent = view.map.corridors.length.toLocaleString();
      document.getElementById("checkpoints").textContent = view.replay.checkpoint_count.toLocaleString();
      document.getElementById("incidents").textContent = view.replay.incident_count.toLocaleString();
      const meta = view.map.metadata;
      document.getElementById("mapMeta").textContent = `${meta.source} | confidence ${meta.confidence} | staleness ${meta.known_staleness_risk}`;
    }

    function updateLayers() {
      layerInputs.forEach(input => {
        const group = svg.querySelector(`[data-layer-group="${input.dataset.layer}"]`);
        if (!group) return;
        group.classList.toggle("is-hidden", !input.checked);
      });
    }

    async function loadCase() {
      try {
        const response = await fetch(`${apiBase()}/admin/cases/${CASE_ID}`);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const view = await response.json();
        state.view = view;
        updateMetrics(view);
        renderMap(view);
        renderEvidenceTree(view);
        setDetail({
          evidence_type: "case_summary",
          source_id: view.case_id,
          source_path: view.artifacts.golden_case,
          summary: view.summary,
          replay: view.replay,
          artifacts: view.artifacts
        });
      } catch (error) {
        document.getElementById("caseMeta").textContent = `Failed to load case: ${error.message}`;
        document.getElementById("detailJson").textContent = String(error.stack || error);
      }
    }

    layerInputs.forEach(input => input.addEventListener("change", updateLayers));
    initSplitters();
    loadCase();
  </script>
</body>
</html>
